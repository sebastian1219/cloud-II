name: INFRA2 - Base Completa

on:
  workflow_dispatch:

jobs:
  infra-base:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 1. Crear VPC (si no existe)
      - name: Crear VPC
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters Name=cidr-block,Values=10.0.0.0/16 --query "Vpcs[0].VpcId" --output text)
          if [ "$VPC_ID" == "None" ]; then
            VPC_ID=$(aws ec2 create-vpc --cidr-block 10.0.0.0/16 --query "Vpc.VpcId" --output text)
          fi
          echo "VPC_ID=$VPC_ID" >> $GITHUB_ENV

      # 2. Crear Security Group para RDS (si no existe)
      - name: Crear Security Group
        run: |
          SG_ID=$(aws ec2 describe-security-groups --filters Name=group-name,Values=rds-vargas-sg --query "SecurityGroups[0].GroupId" --output text)
          if [ "$SG_ID" == "None" ]; then
            SG_ID=$(aws ec2 create-security-group \
              --group-name rds-vargas-sg \
              --description "SG para RDS Vargas" \
              --vpc-id $VPC_ID \
              --query 'GroupId' --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id $SG_ID \
              --protocol tcp \
              --port 3306 \
              --cidr 0.0.0.0/0
          fi
          echo "SG_ID=$SG_ID" >> $GITHUB_ENV

      # 3. Crear DB Subnet Group (si no existe)
      - name: Crear DB Subnet Group
        run: |
          EXISTS=$(aws rds describe-db-subnet-groups --db-subnet-group-name rds-vargas-subnet-group --query "DBSubnetGroups[0].DBSubnetGroupName" --output text 2>/dev/null || echo "None")
          if [ "$EXISTS" == "None" ]; then
            aws rds create-db-subnet-group \
              --db-subnet-group-name rds-vargas-subnet-group \
              --db-subnet-group-description "Subnets para RDS Vargas" \
              --subnet-ids subnet-038977691373e98ed subnet-0d91d416deb27fd22 subnet-091dd4d3fb08cf8f9 subnet-0b84756f40d9180f7 subnet-0c6d8987c3fdaa976
          fi

      # 4. Crear cluster EKS (si no existe)
      - name: Crear cluster EKS
        run: |
          EXISTS=$(aws eks list-clusters --query "clusters" --output text | grep -w cluster-sebastian-vargas || echo "None")
          if [ "$EXISTS" == "None" ]; then
            aws eks create-cluster \
              --name cluster-sebastian-vargas \
              --region us-east-1 \
              --kubernetes-version 1.35 \
              --role-arn arn:aws:iam::637423638685:role/c207582a5277984l14738340t1w637423-LabEksClusterRole-Aj3LY78H20ZR \
              --resources-vpc-config subnetIds=subnet-038977691373e98ed,subnet-0d91d416deb27fd22,subnet-091dd4d3fb08cf8f9,subnet-0b84756f40d9180f7,subnet-0c6d8987c3fdaa976,securityGroupIds=$SG_ID
          fi
          aws eks wait cluster-active --name cluster-sebastian-vargas

      # 5. Crear Node Group (si no existe)
      - name: Crear Node Group
        run: |
          EXISTS=$(aws eks list-nodegroups --cluster-name cluster-sebastian-vargas --query "nodegroups" --output text | grep -w ng-vargas || echo "None")
          if [ "$EXISTS" == "None" ]; then
            aws eks create-nodegroup \
              --cluster-name cluster-sebastian-vargas \
              --nodegroup-name ng-vargas \
              --subnets subnet-038977691373e98ed subnet-0d91d416deb27fd22 subnet-091dd4d3fb08cf8f9 subnet-0b84756f40d9180f7 subnet-0c6d8987c3fdaa976 \
              --node-role arn:aws:iam::637423638685:role/c207582a5277984l14738340t1w637423638-LabEksNodeRole-GE5BQEqXA2iW \
              --instance-types t3.medium \
              --scaling-config minSize=2,maxSize=2,desiredSize=2
          fi

      # 6. Crear RDS MySQL (si no existe)
      - name: Crear RDS MySQL
        run: |
          EXISTS=$(aws rds describe-db-instances --db-instance-identifier rds-vargas --query "DBInstances[0].DBInstanceIdentifier" --output text 2>/dev/null || echo "None")
          if [ "$EXISTS" == "None" ]; then
            aws rds create-db-instance \
              --db-instance-identifier rds-vargas \
              --db-instance-class db.t3.micro \
              --engine mysql \
              --master-username admin \
              --master-user-password SuperSecret123 \
              --allocated-storage 20 \
              --vpc-security-group-ids $SG_ID \
              --db-subnet-group-name rds-vargas-subnet-group
          fi
          aws rds wait db-instance-available --db-instance-identifier rds-vargas

          EXISTS_REPLICA=$(aws rds describe-db-instances --db-instance-identifier rds-vargas-replica --query "DBInstances[0].DBInstanceIdentifier" --output text 2>/dev/null || echo "None")
          if [ "$EXISTS_REPLICA" == "None" ]; then
            aws rds create-db-instance-read-replica \
              --db-instance-identifier rds-vargas-replica \
              --source-db-instance-identifier rds-vargas
          fi

      # 7. Crear bucket S3 (si no existe)
      - name: Crear bucket S3
        run: |
          EXISTS=$(aws s3api head-bucket --bucket terraform-vargas-state 2>/dev/null || echo "None")
          if [ "$EXISTS" == "None" ]; then
            aws s3 mb s3://terraform-vargas-state --region us-east-1
          fi
