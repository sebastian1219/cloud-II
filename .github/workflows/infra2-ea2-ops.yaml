name: INFRA2 - EA2 Ops

on:
  workflow_dispatch:

jobs:
  monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install CloudWatch Agent on VM-A
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=vm-a-vargas" \
            --document-name "AmazonCloudWatch-ManageAgent" \
            --comment "Instalar CloudWatch Agent" \
            --parameters '{"action":["install"],"mode":["ec2"],"optionalConfigurationSource":["ssm"]}'

      - name: Install CloudWatch Agent on VM-B
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=vm-b-vargas" \
            --document-name "AmazonCloudWatch-ManageAgent" \
            --comment "Instalar CloudWatch Agent" \
            --parameters '{"action":["install"],"mode":["ec2"],"optionalConfigurationSource":["ssm"]}'

  alarms:
    runs-on: ubuntu-latest
    steps:
      - name: Create SNS Topic Vargas
        run: |
          aws sns create-topic --name sns-vargas

      - name: Create CloudWatch Alarm CPU EC2
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name "cpu-alarm-vargas" \
            --metric-name CPUUtilization \
            --namespace AWS/EC2 \
            --statistic Average \
            --period 60 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --dimensions Name=InstanceId,Value=${{ secrets.EC2_INSTANCE_ID }} \
            --evaluation-periods 2 \
            --alarm-actions arn:aws:sns:us-east-1:${{ secrets.AWS_ACCOUNT_ID }}:sns-vargas

  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Create Backup Plan Vargas
        run: |
          aws backup create-backup-plan --backup-plan '{
            "BackupPlanName": "backup-plan-vargas",
            "Rules": [{
              "RuleName": "daily-backup",
              "TargetBackupVaultName": "Default",
              "ScheduleExpression": "cron(0 12 * * ? *)",
              "Lifecycle": { "DeleteAfterDays": 7 }
            }]
          }'

  replication:
    runs-on: ubuntu-latest
    steps:
      - name: Check RDS Replica Lag
        run: |
          aws cloudwatch get-metric-statistics \
            --namespace AWS/RDS \
            --metric-name ReplicaLag \
            --dimensions Name=DBInstanceIdentifier,Value=rds-vargas-replica \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --period 60 \
            --statistics Average
