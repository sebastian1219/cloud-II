name: INFRA2 - Monitoreo y Resiliencia

on:
  workflow_dispatch:

jobs:
  monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name cluster-sebastian-vargas

      # R1 - CloudWatch Agent como DaemonSet (skip si ya existe)
      - name: Deploy CloudWatch Agent DaemonSet
        run: |
          EXISTS=$(kubectl get daemonset -n amazon-cloudwatch cwagent 2>/dev/null || echo "None")
          if [ "$EXISTS" == "None" ]; then
            kubectl apply -f https://raw.githubusercontent.com/aws/amazon-cloudwatch-agent-k8s/master/deployment.yaml

            cat <<EOF | kubectl apply -f -
apiVersion: v1
kind: ConfigMap
metadata:
  name: cwagentconfig
  namespace: amazon-cloudwatch
data:
  cwagentconfig.json: |
    {
      "metrics": {
        "namespace": "TechNova/Infra",
        "metrics_collected": {
          "cpu": { "measurement": ["usage_user"] },
          "mem": { "measurement": ["mem_used_percent"] },
          "disk": { "measurement": ["disk_used_percent"], "resources": ["*"] }
        }
      }
    }
EOF
          fi

      # R1 - Dashboard CloudWatch (skip si ya existe)
      - name: Crear Dashboard CloudWatch
        run: |
          EXISTS=$(aws cloudwatch list-dashboards --query "DashboardEntries[?DashboardName=='dashboard-vargas'].DashboardName" --output text)
          if [ "$EXISTS" == "" ]; then
            aws cloudwatch put-dashboard \
              --dashboard-name dashboard-vargas \
              --dashboard-body '{
                "widgets":[
                  {"type":"metric","properties":{"metrics":[["TechNova/Infra","cpu_usage_user","InstanceId","i-VM-A"]],"title":"CPU VM-A"}},
                  {"type":"metric","properties":{"metrics":[["TechNova/Infra","cpu_usage_user","InstanceId","i-VM-B"]],"title":"CPU VM-B"}},
                  {"type":"metric","properties":{"metrics":[["TechNova/Infra","mem_used_percent","InstanceId","i-VM-A"]],"title":"Memoria VM-A"}},
                  {"type":"metric","properties":{"metrics":[["TechNova/Infra","mem_used_percent","InstanceId","i-VM-B"]],"title":"Memoria VM-B"}},
                  {"type":"metric","properties":{"metrics":[["AWS/RDS","CPUUtilization","DBInstanceIdentifier","rds-vargas"]],"title":"CPU RDS"}},
                  {"type":"metric","properties":{"metrics":[["AWS/RDS","DatabaseConnections","DBInstanceIdentifier","rds-vargas"]],"title":"Conexiones RDS"}}
                ]
              }'
          fi

      # R2 - Topic SNS y Alarmas (skip si ya existen)
      - name: Crear Topic SNS y Alarmas
        run: |
          TOPIC_ARN=$(aws sns list-topics --query "Topics[?contains(TopicArn, 'alertas-infra-vargas')].TopicArn" --output text)
          if [ "$TOPIC_ARN" == "" ]; then
            TOPIC_ARN=$(aws sns create-topic --name alertas-infra-vargas --query "TopicArn" --output text)
            aws sns subscribe --topic-arn $TOPIC_ARN --protocol email --notification-endpoint juan@example.com
          fi

          for ALARM in CPU-VM-A-High Mem-VM-A-High CPU-RDS-High Conn-RDS-High; do
            EXISTS=$(aws cloudwatch describe-alarms --alarm-names $ALARM --query "MetricAlarms[0].AlarmName" --output text 2>/dev/null || echo "None")
            if [ "$EXISTS" == "None" ]; then
              case $ALARM in
                CPU-VM-A-High)
                  aws cloudwatch put-metric-alarm --alarm-name $ALARM --metric-name cpu_usage_user --namespace TechNova/Infra --statistic Average --period 60 --threshold 70 --comparison-operator GreaterThanThreshold --dimensions Name=InstanceId,Value=i-VM-A --evaluation-periods 1 --alarm-actions $TOPIC_ARN
                  ;;
                Mem-VM-A-High)
                  aws cloudwatch put-metric-alarm --alarm-name $ALARM --metric-name mem_used_percent --namespace TechNova/Infra --statistic Average --period 60 --threshold 75 --comparison-operator GreaterThanThreshold --dimensions Name=InstanceId,Value=i-VM-A --evaluation-periods 1 --alarm-actions $TOPIC_ARN
                  ;;
                CPU-RDS-High)
                  aws cloudwatch put-metric-alarm --alarm-name $ALARM --metric-name CPUUtilization --namespace AWS/RDS --statistic Average --period 60 --threshold 80 --comparison-operator GreaterThanThreshold --dimensions Name=DBInstanceIdentifier,Value=rds-vargas --evaluation-periods 1 --alarm-actions $TOPIC_ARN
                  ;;
                Conn-RDS-High)
                  aws cloudwatch put-metric-alarm --alarm-name $ALARM --metric-name DatabaseConnections --namespace AWS/RDS --statistic Average --period 60 --threshold 50 --comparison-operator GreaterThanThreshold --dimensions Name=DBInstanceIdentifier,Value=rds-vargas --evaluation-periods 1 --alarm-actions $TOPIC_ARN
                  ;;
              esac
            fi
          done

      # R3 - Backup Plan (skip si ya existe)
      - name: Crear Backup Plan y Selección
        run: |
          PLAN_ID=$(aws backup list-backup-plans --query "BackupPlansList[?BackupPlanName=='backup-diario-vargas'].BackupPlanId" --output text)
          if [ "$PLAN_ID" == "" ]; then
            PLAN_ID=$(aws backup create-backup-plan --backup-plan '{
              "BackupPlanName":"backup-diario-vargas",
              "Rules":[{"RuleName":"diario","TargetBackupVaultName":"Default","ScheduleExpression":"cron(0 12 * * ? *)","Lifecycle":{"DeleteAfterDays":7}}]
            }' --query "BackupPlanId" --output text)

            aws backup create-backup-selection --backup-plan-id $PLAN_ID --backup-selection '{
              "SelectionName":"infra-vargas",
              "Resources":["arn:aws:ec2:us-east-1:637423638685:instance/i-VM-A","arn:aws:ec2:us-east-1:637423638685:instance/i-VM-B","arn:aws:rds:us-east-1:637423638685:db:rds-vargas"]
            }'
          fi

      # R4 - Validación réplica RDS (solo consulta)
      - name: Validar réplica RDS
        run: |
          aws rds describe-db-instances --db-instance-identifier rds-vargas
          aws rds describe-db-instances --db-instance-identifier rds-vargas-replica
          aws cloudwatch get-metric-data --metric-data-queries '[{"Id":"replicaLag","MetricStat":{"Metric":{"Namespace":"AWS/RDS","MetricName":"ReplicaLag","Dimensions":[{"Name":"DBInstanceIdentifier","Value":"rds-vargas-replica"}]},"Period":60,"Stat":"Average"}}]' --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ) --end-time $(date -u +%Y-%m-%dT%H:%M:%SZ)
